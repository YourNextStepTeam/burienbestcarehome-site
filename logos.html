<!DOCTYPE html>

<title>Brand Logos</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  .logo-card h2 { font-size: 0.9rem; color: #555; margin-bottom: 10px; }
  .logo-card svg { width: 100%; height: auto; display: block; }
  .note { text-align: center; color: #999; font-size: 0.75rem; margin-top: 16px; }
</style>
</head>
<body>
<div class="container">
  <h1>Brand Logos</h1>
